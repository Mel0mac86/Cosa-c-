name: Deploy AllerScan su GitHub Pages

on:
  push:
    branches:
      - main
      - claude/allergen-scanner-app-vq3t5o
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola esecuzione alla volta
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Pages
        uses: actions/configure-pages@v5

      - name: Carica artifact (intero sito statico)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
